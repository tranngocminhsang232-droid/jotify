<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note — Offline (JOTIFY)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        /* ── Tokens (dark — matches app default offline state) ── */
        :root {
            --bg:      #071910;
            --card:    #0d2318;
            --text:    #f0fdf4;
            --muted:   #a3e6bb;
            --accent:  #22c55e;
            --border:  #1a3d28;
            --hover:   #102a1c;
            --input-bg:#0a1e13;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1rem;
            height: 64px;
            background: rgba(7,25,16,0.97);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            border-radius: 8px;
            background: var(--hover);
            color: var(--muted);
            text-decoration: none;
            font-size: 1.25rem;
            transition: background 0.15s;
        }
        header a:hover { background: #1a3d28; }
        #save-status {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .offline-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }

        /* ── Save button ── */
        #btn-save {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 0.6rem;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.18s, transform 0.18s;
        }
        #btn-save:hover { background: #16a34a; transform: translateY(-1px); }
        #btn-save:active { transform: scale(0.96); }
        #btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Main editor ── */
        main {
            flex: 1;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        #note-not-found {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            text-align: center;
            gap: 1rem;
        }
        #note-not-found h2 { margin: 0; font-size: 1.25rem; }
        #note-not-found p  { color: var(--muted); margin: 0; font-size: 0.875rem; }
        #note-not-found a  { color: var(--accent); }

        #editor-wrap { display: none; }

        #note-title {
            width: 100%;
            font-size: 1.5rem;
            font-weight: 700;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            margin-bottom: 1rem;
            padding: 0;
            line-height: 1.3;
        }
        #note-title::placeholder { color: rgba(163,230,187,0.35); }

        #note-content {
            width: 100%;
            min-height: 420px;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
            padding: 0;
            font-family: inherit;
        }
        #note-content::placeholder { color: rgba(163,230,187,0.35); }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.625rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            display: none;
            align-items: center;
            gap: 6px;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        #toast.show { display: flex; }
        #toast.success { background: #16a34a; }
        #toast.error   { background: #ef4444; }
        #toast.info    { background: #3b82f6; }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    </style>
    <!-- bcryptjs loaded locally — SW caches static .js files -->
    <script src="/js/bcryptjs.js"></script>
</head>
<body>
<header>
    <a href="/notes" title="Back to Notes">&#8592;</a>

    <span id="save-status">
        <span id="save-icon">&#8203;</span>
        <span id="save-text">Loading…</span>
    </span>

    <div class="offline-badge" style="margin-left:auto;">
        📴 Offline
    </div>

    <button id="btn-save" onclick="saveOffline()" disabled>
        💾 Save locally
    </button>
</header>

<main>
    <div id="note-not-found">
        <h2>📭 Note not found</h2>
        <p>This note hasn't been synced locally yet.<br>
           Please visit it while online first so it can be cached.</p>
        <a href="/notes">← Back to Notes</a>
    </div>

    <div id="pw-gate" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;text-align:center;gap:1rem;">
        <span style="font-size:2.5rem;">🔒</span>
        <h2 style="margin:0;font-size:1.25rem;">Password Protected</h2>
        <p style="color:var(--muted);margin:0;font-size:0.875rem;">Enter the password to access this note offline.</p>
        <form id="pw-gate-form" style="display:flex;flex-direction:column;gap:0.75rem;width:100%;max-width:320px;margin-top:0.5rem;">
            <input type="password" id="pw-gate-input" placeholder="Note password…" autocomplete="off"
                   style="width:100%;padding:0.6rem 0.9rem;border-radius:0.6rem;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.9rem;outline:none;">
            <div id="pw-gate-error" style="display:none;color:#ef4444;font-size:0.8rem;"></div>
            <button type="submit" style="background:var(--accent);color:#fff;border:none;padding:0.55rem 1rem;border-radius:0.6rem;font-weight:700;font-size:0.85rem;cursor:pointer;">Unlock</button>
        </form>
    </div>

    <div id="editor-wrap" style="display:none;">
        <input type="text" id="note-title" placeholder="Note title…" autocomplete="off">
        <textarea id="note-content" placeholder="Start writing…"></textarea>
    </div>
</main>

<div id="toast"></div>

<script type="module">
// ── Read note ID from URL (/notes/36/edit or /notes/36) ──────────────────────
const match = location.pathname.match(/\/notes\/(\d+)/);
const noteId = match ? parseInt(match[1], 10) : null;

// ── Minimal IDB wrapper (same DB as main app) ────────────────────────────────
async function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open('jotify-offline', 3);
        req.onsuccess = () => res(req.result);
        req.onerror   = () => rej(req.error);
        // If the DB doesn't exist yet we get an upgrade — just open it
        req.onupgradeneeded = () => {};
    });
}
async function getNoteFromIDB(id) {
    const db = await openDB();
    if (!db.objectStoreNames.contains('notes')) return null;
    return new Promise((res, rej) => {
        const tx = db.transaction('notes', 'readonly');
        const req = tx.objectStore('notes').get(id);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror   = () => rej(req.error);
    });
}
async function queueUpdateIDB(noteId, data) {
    const db = await openDB();
    if (!db.objectStoreNames.contains('pending_updates')) return;
    const tx = db.transaction(['pending_updates', 'notes'], 'readwrite');
    tx.objectStore('pending_updates').put({ noteId, ...data, queued_at: Date.now() });
    // Keep notes cache fresh
    const existing = await new Promise(r => {
        const req = tx.objectStore('notes').get(noteId);
        req.onsuccess = () => r(req.result ?? null);
    });
    if (existing) {
        tx.objectStore('notes').put({
            ...existing,
            title:   data.title   ?? existing.title,
            content: data.content ?? existing.content,
            updated_at: 'Pending sync…',
            _pending: true,
        });
    }
    return new Promise((res, rej) => {
        tx.oncomplete = () => res();
        tx.onerror    = () => rej(tx.error);
    });
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    setTimeout(() => el.classList.remove('show'), 3000);
}
function setSaveStatus(icon, text) {
    document.getElementById('save-icon').textContent = icon;
    document.getElementById('save-text').textContent = text;
}

// ── Load note from IDB ───────────────────────────────────────────────────────
async function init() {
    if (!noteId) {
        document.getElementById('note-not-found').style.display = 'flex';
        setSaveStatus('', 'Unknown note');
        return;
    }

    document.title = `Note #${noteId} — Offline (JOTIFY)`;

    let note = null;
    try { note = await getNoteFromIDB(noteId); } catch(e) {}

    if (!note) {
        document.getElementById('note-not-found').style.display = 'flex';
        setSaveStatus('⚠️', 'Not cached');
        return;
    }

    // Password gate — verify before showing content
    if (note.has_password && note.note_password) {
        // Check if already unlocked via main app session flag
        const wasUnlocked = sessionStorage.getItem('offline_unlocked_' + noteId);
        if (!wasUnlocked) {
            document.getElementById('pw-gate').style.display = 'flex';
            document.getElementById('pw-gate-input').focus();
            document.getElementById('pw-gate-form').onsubmit = async (e) => {
                e.preventDefault();
                const pw = document.getElementById('pw-gate-input').value;
                const errEl = document.getElementById('pw-gate-error');
                try {
                    // Use locally loaded bcryptjs (cached by SW as static asset)
                    if (!window.bcrypt || !window.bcrypt.compareSync) {
                        errEl.textContent = 'Password verification unavailable offline.';
                        errEl.style.display = 'block';
                        return;
                    }
                    if (!window.bcrypt.compareSync(pw, note.note_password)) {
                        errEl.textContent = 'Incorrect password.';
                        errEl.style.display = 'block';
                        document.getElementById('pw-gate-input').value = '';
                        document.getElementById('pw-gate-input').focus();
                        return;
                    }
                } catch(_) {
                    errEl.textContent = 'Password verification unavailable offline.';
                    errEl.style.display = 'block';
                    return;
                }
                sessionStorage.setItem('offline_unlocked_' + noteId, '1');
                document.getElementById('pw-gate').style.display = 'none';
                showEditor(note);
            };
            return; // wait for password submission
        }
    }

    showEditor(note);
}

function showEditor(note) {
    // Populate editor
    document.getElementById('note-title').value   = note.title   ?? '';
    document.getElementById('note-content').value = note.content ?? '';
    if (note.title) document.title = note.title + ' — Offline (JOTIFY)';

    document.getElementById('editor-wrap').style.display = 'block';
    document.getElementById('btn-save').disabled = false;
    setSaveStatus('🟡', 'Offline — changes saved locally');

    // Auto-save on input
    let _timer = null;
    function scheduleAutoSave() {
        clearTimeout(_timer);
        _timer = setTimeout(saveOffline, 1200);
    }
    document.getElementById('note-title').addEventListener('input', scheduleAutoSave);
    document.getElementById('note-content').addEventListener('input', scheduleAutoSave);
}

// ── Save to IDB queue ────────────────────────────────────────────────────────
window.saveOffline = async function() {
    const title   = document.getElementById('note-title')?.value   ?? '';
    const content = document.getElementById('note-content')?.value ?? '';
    try {
        await queueUpdateIDB(noteId, { title, content });
        setSaveStatus('🟢', 'Saved locally — will sync when online');
        toast('Saved offline', 'success');
    } catch(e) {
        setSaveStatus('🔴', 'Save failed');
        toast('Save failed', 'error');
    }
};

// ── Sync when back online ────────────────────────────────────────────────────
window.addEventListener('online', async () => {
    setSaveStatus('🔄', 'Syncing…');
    try {
        // Get pending update for this note
        const db = await openDB();
        if (!db.objectStoreNames.contains('pending_updates')) return;
        const pending = await new Promise(r => {
            const req = db.transaction('pending_updates', 'readonly')
                           .objectStore('pending_updates').get(noteId);
            req.onsuccess = () => r(req.result ?? null);
        });
        if (!pending) {
            // No local edits — redirect to real editor
            window.location.href = `/notes/${noteId}/edit`;
            return;
        }

        // Try to push to server
        const res = await fetch(`/notes/${noteId}/auto-save`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                // csrfToken may not be available in this shell — use meta tag if injected
                'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.content ?? '',
            },
            body: JSON.stringify({ title: pending.title, content: pending.content }),
        });
        if (res.ok) {
            // Remove from queue
            const tx2 = db.transaction('pending_updates', 'readwrite');
            tx2.objectStore('pending_updates').delete(noteId);
            setSaveStatus('✅', 'Synced! Redirecting…');
            toast('Changes synced!', 'success');
            setTimeout(() => { window.location.href = `/notes/${noteId}/edit`; }, 1200);
        }
    } catch(e) {
        setSaveStatus('⚠️', 'Sync failed — still offline?');
    }
});

init();
</script>
</body>
</html>
