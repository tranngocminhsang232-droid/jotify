<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteKeeper - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        .icon {
            width: 80px; height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 36px;
            box-shadow: 0 8px 30px rgba(99,102,241,0.3);
        }
        h1 { font-size: 28px; margin-bottom: 12px; font-weight: 700; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.45); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📝</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry—your notes are safe. Please reconnect to continue.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
