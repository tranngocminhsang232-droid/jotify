[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.tokenizer", "php83Extensions.fileinfo", "php83Extensions.openssl", "nodejs_22", "nodePackages.npm"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan optimize:clear",
  "php artisan event:cache",
  "php artisan view:cache"
]

# config:cache AND route:cache are deliberately REMOVED from the build phase.
# On Railway, environment variables are only available at RUNTIME, not during build.
# Running config:cache during build bakes NULL values for APP_KEY, DB_HOST, etc.
# into the cached config → 500 errors at runtime.
#
# Instead, we cache config + routes at startup via the start command.

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
