<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2b1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" />
  <!-- Subtle border -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Letter J -->
  <text x="50" y="68"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="56"
        font-weight="bold"
        font-style="italic"
        text-anchor="middle"
        fill="url(#letter)">J</text>
</svg>
